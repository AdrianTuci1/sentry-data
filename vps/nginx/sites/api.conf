# HTTPS will be added later via certbot (Let's Encrypt)
# For now: HTTP-only proxy to backend

server {
    listen 80;
    server_name api.statsparrot.com;

    client_max_body_size 100M;

    # Certbot challenge (for future SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to backend (variable-based resolver)
    set $backend_upstream backend:3000;

    location / {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
