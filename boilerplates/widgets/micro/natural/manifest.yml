title: "Natural Micro"
description: "KPI with unit and a linear slider fill."
component: "NaturalMicro"
runtime_type: "natural"
aliases:
  - "linear-kpi"
category: "micro"
selection_hints:
  - "single KPI"
  - "progress against scale"
  - "current status"
component_id_overrides: []
data_requirements:
  - "value: Primary displayed value."
  - "sliderValue: 0-100 slider fill percentage."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Primary displayed value."
  - alias: "unit"
    path: "data.unit"
    required: false
    sql_type: "string"
    expression_hint: "unit"
    description: "Unit or suffix."
  - alias: "sliderValue"
    path: "data.sliderValue"
    required: true
    sql_type: "number"
    expression_hint: "sliderValue"
    description: "0-100 slider fill percentage."
  - alias: "footerTextLeft"
    path: "data.footerTextLeft"
    required: false
    sql_type: "string"
    expression_hint: "footerTextLeft"
    description: "Optional left footer label."
  - alias: "footerTextRight"
    path: "data.footerTextRight"
    required: false
    sql_type: "string"
    expression_hint: "footerTextRight"
    description: "Optional right footer label."
data_structure_template:
  data:
    value: "$24"
    unit: "avg"
    sliderValue: 68
    footerTextLeft: "target"
    footerTextRight: "ceiling"
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    unit: "unit"
    sliderValue: "sliderValue"
    footerTextLeft: "footerTextLeft"
    footerTextRight: "footerTextRight"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "natural"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "$24"
    unit: "avg"
    sliderValue: 68
    footerTextLeft: "target"
    footerTextRight: "ceiling"
