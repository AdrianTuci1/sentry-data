title: "Trend Spotter"
description: "Weighted keyword cloud with trend direction."
component: "TrendSpotter"
runtime_type: "trend-spotter"
aliases: []
category: "misc"
selection_hints:
  - "keyword cloud"
  - "emerging terms"
  - "weighted trend list"
component_id_overrides: []
data_requirements:
  - "keywords: Ordered keyword rows."
sql_aliases:
  - alias: "keywords"
    path: "data.keywords"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(text := keyword_text, weight := weight_value, trend := trend_direction) ORDER BY weight_value DESC)"
    description: "Ordered keyword rows."
data_structure_template:
  data:
    keywords:
      - text: "creator-led"
        weight: 93
        trend: "up"
      - text: "ugc proof"
        weight: 87
        trend: "up"
grid_span: "col-span-2 row-span-2"
color_theme: "theme-audience"
sdui:
  root_key: "data"
  mapping_mode: "list"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "list"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    keywords: "list(struct_pack(text := keyword_text, weight := weight_value, trend := trend_direction) ORDER BY weight_value DESC)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "trend-spotter"
  gridSpan: "col-span-2 row-span-2"
  colorTheme: "theme-audience"
  data:
    keywords:
      - text: "creator-led"
        weight: 93
        trend: "up"
      - text: "ugc proof"
        weight: 87
        trend: "up"
