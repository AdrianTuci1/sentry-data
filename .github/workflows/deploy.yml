name: 🚀 Deploy Complete Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  DOMAIN: ${{ vars.DOMAIN || 'statsparrot.com' }}
  LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
  LLM_MODEL_ID: ${{ vars.LLM_MODEL_ID || 'deepseek-v4-flash' }}
  LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.deepseek.com/v1' }}

jobs:
  deploy-gcp-infrastructure:
    if: github.event_name == 'workflow_dispatch'
    name: 📦 Deploy GCP Infrastructure
    runs-on: ubuntu-latest
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION || 'europe-west1' }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_domain: ${{ vars.DOMAIN || 'statsparrot.com' }}
      TF_VAR_vps_host: ${{ secrets.VPS_HOST }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_internal_token: ${{ secrets.INTERNAL_TOKEN }}
      TF_VAR_llm_api_key: ${{ secrets.LLM_API_KEY }}
      TF_VAR_llm_provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
      TF_VAR_llm_model_id: ${{ vars.LLM_MODEL_ID || 'deepseek-v4-flash' }}
      TF_VAR_llm_base_url: ${{ vars.LLM_BASE_URL || 'https://api.deepseek.com/v1' }}
    outputs:
      gcp_status: ${{ steps.status.outputs.status }}
      scheduler_invoker_sa: ${{ steps.outputs.outputs.scheduler_invoker_sa }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 🏗️ Ensure Cloudflare Pages Projects exist
        id: cf_project
        run: |
          # Create the Pages projects if they don't exist (idempotent)
          for project in statsparrot-app statsparrot-landing; do
            curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$project\",\"production_branch\":\"main\"}" || true
          done
          echo "Pages projects ready"

      - name: 🏗️ Terraform Init
        id: init
        run: |
          cd terraform
          terraform init -no-color
        continue-on-error: false

      - name: 📋 Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -out=tfplan -no-color
        continue-on-error: false

      - name: 🚀 Terraform Apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve tfplan -no-color
        continue-on-error: false

      - name: 📊 Capture Outputs
        id: outputs
        if: success()
        run: |
          cd terraform
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "scheduler_invoker_sa=$(terraform output -raw scheduler_invoker_service_account_email)" >> $GITHUB_OUTPUT
          echo "gcs_bucket=$(terraform output -raw gcs_bucket)" >> $GITHUB_OUTPUT
          echo "bq_dataset=$(terraform output -raw bigquery_dataset)" >> $GITHUB_OUTPUT

      - name: ✅ Set Status
        id: status
        if: always()
        run: |
          if [ "${{ steps.init.outcome }}" == "success" ] && \
             [ "${{ steps.plan.outcome }}" == "success" ] && \
             [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "✅ GCP Infrastructure deployed successfully!"
            echo "   - Firestore Database"
            echo "   - BigQuery Dataset"
            echo "   - Cloud Storage Bucket"
            echo "   - Secret Manager"
            echo "   - Service Accounts"
            echo "   - Cloud Scheduler API"
            echo "   - Service IAM bindings"
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "❌ GCP Infrastructure deployment failed!"
            exit 1
          fi

      - name: 📝 Log Results
        if: always()
        run: |
          echo "::group::🔍 GCP Infrastructure Deploy Log"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  📦 GCP INFRASTRUCTURE                                      │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  Terraform Init:  ${{ steps.init.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Terraform Plan:   ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Terraform Apply:  ${{ steps.apply.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│                                                             │"
          echo "│  Resources:                                                 │"
          echo "│    ✅ Firestore Database                                    │"
          echo "│    ✅ BigQuery Dataset                                      │"
          echo "│    ✅ Cloud Storage Bucket                                  │"
          echo "│    ✅ Secret Manager (3 secrets)                            │"
          echo "│    ✅ Service Accounts (5)                                  │"
          echo "│    ✅ Cloud Scheduler API                                   │"
          echo "│                                                             │"
          echo "│  ${{ steps.status.outputs.status }}                                       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

  deploy-vps-backend:
    if: github.event_name == 'workflow_dispatch'
    name: 🖥️ Deploy All Services to VPS
    needs: deploy-gcp-infrastructure
    runs-on: ubuntu-latest
    outputs:
      vps_status: ${{ steps.status.outputs.status }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🔑 Ensure refresh token secret exists
        id: refresh_secret
        run: |
          SECRET_NAME="refresh-token-secret"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          if ! gcloud secrets describe "$SECRET_NAME" --project="$PROJECT_ID" >/dev/null 2>&1; then
            SECRET_VALUE="$(openssl rand -base64 48 | tr -d '\n')"
            printf '%s' "$SECRET_VALUE" | gcloud secrets create "$SECRET_NAME" \
              --project="$PROJECT_ID" \
              --replication-policy="automatic" \
              --data-file=-
          fi

          if ! gcloud secrets versions list "$SECRET_NAME" --project="$PROJECT_ID" --limit=1 --format='value(name)' | grep -q .; then
            SECRET_VALUE="$(openssl rand -base64 48 | tr -d '\n')"
            printf '%s' "$SECRET_VALUE" | gcloud secrets versions add "$SECRET_NAME" \
              --project="$PROJECT_ID" \
              --data-file=-
          fi

          REFRESH_TOKEN_SECRET="$(gcloud secrets versions access latest --secret="$SECRET_NAME" --project="$PROJECT_ID")"
          echo "::add-mask::$REFRESH_TOKEN_SECRET"
          echo "value=$REFRESH_TOKEN_SECRET" >> "$GITHUB_OUTPUT"

      - name: 🔐 Setup SSH
        id: ssh
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🔍 Add VPS to known hosts
        id: known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🐳 Build Docker Images
        id: build
        run: |
          echo "::group::🔨 Building Docker Images"
          docker build -t sentry-backend:${{ github.sha }} ./backend
          docker build -t sentry-sync-worker:${{ github.sha }} -f ./backend/Dockerfile.worker ./backend
          docker build -t sentry-chat:${{ github.sha }} ./services/chat
          docker build -t sentry-harness:${{ github.sha }} ./services/harness
          docker build -t sentry-observer:${{ github.sha }} ./services/observer
          echo "::endgroup::"

      - name: 💾 Save Docker Images
        id: save
        run: |
          echo "::group::💾 Saving Docker Images"
          docker save sentry-backend:${{ github.sha }} > backend-image.tar
          docker save sentry-sync-worker:${{ github.sha }} > sync-worker-image.tar
          docker save sentry-chat:${{ github.sha }} > chat-image.tar
          docker save sentry-harness:${{ github.sha }} > harness-image.tar
          docker save sentry-observer:${{ github.sha }} > observer-image.tar
          echo "::endgroup::"

      - name: 🔧 Ensure VPS Directory + Clean old tars
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/sentry-data /opt/sentry-data/secrets /opt/sentry-data/nginx"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "rm -f /opt/sentry-data/*.tar"

      - name: 📤 Copy Images to VPS
        id: copy_images
        run: |
          echo "::group::📤 Copying Images to VPS"
          scp backend-image.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp sync-worker-image.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp chat-image.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp harness-image.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp observer-image.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          echo "::endgroup::"

      - name: 📋 Copy Config Files
        id: copy_config
        run: |
          echo "::group::📋 Copying Config Files"
          scp vps/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp vps/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          scp -r vps/nginx ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/
          
          # Create .env and gcp-key.json locally, then SCP to VPS
          cat > /tmp/sentry-env << ENVEOF
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION=europe-west1
          GCS_BUCKET_NAME=sentry-platform-data-${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET_PREFIX=sentry_dataset
          BIGQUERY_LOCATION=EU
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          INTERNAL_TOKEN=${{ secrets.INTERNAL_TOKEN }}
          LLM_PROVIDER=${{ env.LLM_PROVIDER }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_MODEL=${{ env.LLM_MODEL_ID }}
          LLM_MODEL_ID=${{ env.LLM_MODEL_ID }}
          LLM_BASE_URL=${{ env.LLM_BASE_URL }}
          ENABLE_BIGQUERY_ANALYTICS=true
          ACCESS_TOKEN_EXPIRES_IN=15m
          REFRESH_TOKEN_EXPIRES_IN=30d
          REFRESH_TOKEN_SECRET=${{ steps.refresh_secret.outputs.value }}
          CORS_ORIGIN=https://app.${{ env.DOMAIN }}
          CHAT_SERVICE_URL=http://chat:8080
          HARNESS_SERVICE_URL=http://harness:8081
          OBSERVER_SERVICE_URL=http://observer:8082
          CLOUD_RUN_AUTH_MODE=disabled
          CLOUD_SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL=${{ needs.deploy-gcp-infrastructure.outputs.scheduler_invoker_sa }}
          GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://api.${{ env.DOMAIN }}/api/v1/auth/google/callback
          FRONTEND_URL=https://app.${{ env.DOMAIN }}
          ENVEOF
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
          scp /tmp/sentry-env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/.env
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/sentry-data/secrets && chmod 644 /opt/sentry-data/secrets/gcp-key.json 2>/dev/null; true"
          scp /tmp/gcp-key.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sentry-data/secrets/gcp-key.json
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "chmod 644 /opt/sentry-data/secrets/gcp-key.json"
          echo "::endgroup::"

      - name: 🚀 Deploy on VPS
        id: deploy
        run: |
          echo "::group::🚀 Deploying on VPS"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOY'
            cd /opt/sentry-data
            
            # Load new images
            docker load < backend-image.tar
            docker load < sync-worker-image.tar
            docker load < chat-image.tar
            docker load < harness-image.tar
            docker load < observer-image.tar
            
            # Tag as latest
            docker tag sentry-backend:${{ github.sha }} sentry-backend:latest
            docker tag sentry-sync-worker:${{ github.sha }} sentry-sync-worker:latest
            docker tag sentry-chat:${{ github.sha }} sentry-chat:latest
            docker tag sentry-harness:${{ github.sha }} sentry-harness:latest
            docker tag sentry-observer:${{ github.sha }} sentry-observer:latest
            
            # Restart services
            docker compose down
            docker compose up -d
            
            # Cleanup
            docker system prune -f
            rm -f *.tar
            
            # Wait for services to start
            sleep 15
          DEPLOY
          echo "::endgroup::"

      - name: 🏥 Health Check
        id: health
        run: |
          echo "::group::🏥 Health Check"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'HEALTHCHECK'
            set -e
            cd /opt/sentry-data

            for attempt in $(seq 1 18); do
              if curl -fsS http://localhost:3000/api/v1/health >/dev/null && \
                 curl -fsS http://localhost:3000/api/v1/health/ready >/dev/null; then
                echo "✅ Backend is healthy and ready"
                exit 0
              fi

              echo "Attempt ${attempt}/18: backend not ready yet"
              sleep 10
            done

            echo "❌ Backend failed health checks after 180s"
            docker compose ps
            docker compose logs backend --tail=120
            exit 1
          HEALTHCHECK
          echo "::endgroup::"

      - name: ✅ Set Status
        id: status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ] && \
             [ "${{ steps.health.outcome }}" == "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Log Results
        if: always()
        run: |
          echo "::group::🔍 VPS Backend Deploy Log"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🖥️  VPS BACKEND                                            │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  SSH Setup:       ${{ steps.ssh.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Build Images:    ${{ steps.build.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Copy Images:     ${{ steps.copy_images.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Copy Config:     ${{ steps.copy_config.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Deploy:          ${{ steps.deploy.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Health Check:    ${{ steps.health.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│                                                             │"
          echo "│  Services:                                                  │"
          echo "│    ✅ Backend API (port 3000)                               │"
          echo "│    ✅ Chat Service (LLM, port 8080)                         │"
          echo "│    ✅ Harness Service (LLM, port 8081)                      │"
          echo "│    ✅ Observer Service (analytics, port 8082)               │"
          echo "│    ✅ Sync Worker (cron every 5 min)                        │"
          echo "│    ✅ Nginx (reverse proxy + SSL)                           │"
          echo "│                                                             │"
          echo "│  ${{ steps.status.outputs.status }}                                       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f backend-image.tar sync-worker-image.tar chat-image.tar harness-image.tar observer-image.tar

  deploy-landing:
    if: github.event_name == 'workflow_dispatch'
    name: 🏠 Deploy Landing Page
    needs: deploy-gcp-infrastructure
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    outputs:
      landing_status: ${{ steps.status.outputs.status }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package.json

      - name: 🔨 Build Landing Page
        id: build
        run: |
          cd landing
          npm ci
          npm run build

      - name: 🚀 Deploy Landing Page to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: statsparrot-landing
          directory: landing/dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Set Status
        id: status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Log Results
        if: always()
        run: |
          echo "::group::🔍 Landing Page Deploy Log"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🏠 LANDING PAGE                                            │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  Build:           ${{ steps.build.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Deploy:          ${{ steps.deploy.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│                                                             │"
          echo "│  Platform:  Cloudflare Pages (CDN Global)                     │"
          echo "│  URL:       https://${{ env.DOMAIN }}                                   │"
          echo "│                                                             │"
          echo "│  ${{ steps.status.outputs.status }}                                       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

  deploy-app:
    if: github.event_name == 'workflow_dispatch'
    name: 🌐 Deploy App Frontend
    needs: deploy-vps-backend
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    outputs:
      app_status: ${{ steps.status.outputs.status }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: 🔨 Build Frontend App
        id: build
        run: |
          cd frontend
          cat > .env.production << ENVEOF
          VITE_API_URL=https://api.${{ env.DOMAIN }}/api/v1
          VITE_DEV_MODE=false
          ENVEOF
          npm ci
          npm run build

      - name: 🚀 Deploy App to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: statsparrot-app
          directory: frontend/dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Set Status
        id: status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Log Results
        if: always()
        run: |
          echo "::group::🔍 App Deploy Log"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🌐 APP FRONTEND                                            │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  Build:           ${{ steps.build.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│  Deploy:          ${{ steps.deploy.outcome == 'success' && '✅' || '❌' }}                                        │"
          echo "│                                                             │"
          echo "│  Platform:  Cloudflare Pages (CDN Global)                     │"
          echo "│  URL:       https://app.${{ env.DOMAIN }}                              │"
          echo "│                                                             │"
          echo "│  ${{ steps.status.outputs.status }}                                       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

  final-summary:
    name: 📊 Final Summary
    needs: [deploy-gcp-infrastructure, deploy-vps-backend, deploy-landing, deploy-app]
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "::group::🎉 DEPLOY SUMMARY"
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════╗"
          echo "║          🚀 SENTRY DATA PLATFORM - DEPLOY RESULTS             ║"
          echo "╠═══════════════════════════════════════════════════════════════╣"
          echo "║                                                               ║"
          echo "║  📦 GCP Infrastructure:  ${{ needs.deploy-gcp-infrastructure.outputs.gcp_status || '⏭️ SKIPPED' }}                    ║"
          echo "║  🖥️  VPS Backend:        ${{ needs.deploy-vps-backend.outputs.vps_status || '⏭️ SKIPPED' }}                    ║"
          echo "║  🏠 Landing Page:        ${{ needs.deploy-landing.outputs.landing_status || '⏭️ SKIPPED' }}                    ║"
          echo "║  🌐 App Frontend:        ${{ needs.deploy-app.outputs.app_status || '⏭️ SKIPPED' }}                    ║"
          echo "║                                                               ║"
          echo "╠═══════════════════════════════════════════════════════════════╣"
          echo "║  URLs:                                                        ║"
          echo "║    🏠 Landing:   https://${{ env.DOMAIN }}                                │"
          echo "║    🌐 App:        https://app.${{ env.DOMAIN }}                            │"
          echo "║    🔌 API:       https://api.${{ env.DOMAIN }}                            │"
          echo "║                                                               ║"
          echo "╠═══════════════════════════════════════════════════════════════╣"
          echo "║  Resources:                                                   ║"
          echo "║    ✅ GCP Project: ${{ secrets.GCP_PROJECT_ID }}                            │"
          echo "║    ✅ VPS: ${{ secrets.VPS_HOST }}                                          │"
          echo "║    ✅ Cloudflare Zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}                    │"
          echo "║                                                               ║"
          echo "╚═══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "::endgroup::"

      - name: 🎉 Success Notification
        if: needs.deploy-gcp-infrastructure.result == 'success' && needs.deploy-vps-backend.result == 'success' && needs.deploy-landing.result == 'success' && needs.deploy-app.result == 'success'
        run: |
          echo "🎉🎉🎉 ALL SYSTEMS DEPLOYED SUCCESSFULLY! 🎉🎉🎉"

      - name: ❌ Failure Notification
        if: failure()
        run: |
          echo "❌❌❌ DEPLOY FAILED - CHECK LOGS ABOVE ❌❌❌"
