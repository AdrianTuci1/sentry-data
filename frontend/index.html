<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>Parrot — Unified Data & Analytics Platform</title>
  <meta name="title" content="Parrot - Unified Data & Analytics Platform" />
  <meta name="description"
    content="Connect all your data sources, visualize insights, and monitor your business in real time with Parrot." />
  <meta name="keywords" content="data analytics, integrations, monitoring, dashboards, business intelligence, parrot" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Parrot" />
  <meta name="theme-color" content="#0B0D0E" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Parrot" />
  <meta property="og:title" content="Parrot — Unified Data & Analytics Platform" />
  <meta property="og:description"
    content="Connect all your data sources, visualize insights, and monitor your business in real time with Parrot." />
  <meta property="og:image" content="/logo.svg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Parrot — Unified Data & Analytics Platform" />
  <meta name="twitter:description"
    content="Connect all your data sources, visualize insights, and monitor your business in real time with Parrot." />
  <meta name="twitter:image" content="/logo.svg" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/logo.svg" />

  <!-- Canonical (inline to avoid Vite resolving "/") -->

  <!-- Preconnect external origins (adjust if you have API / CDN domains) -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Inline critical styles for the loading splash -->
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #root,
    #parrot-splash {
      height: 100%;
      width: 100%;
    }

    #parrot-splash {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B0D0E;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #E3E3E3;
    }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      animation: splash-pulse 1.8s ease-in-out infinite;
    }

    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(168, 199, 250, 0.2);
      border-top-color: #A8C7FA;
      border-radius: 50%;
      animation: splash-spin 0.7s linear infinite;
    }

    @keyframes splash-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.55;
      }
    }

    @keyframes splash-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Splash shown until React hydrates; removed automatically by React -->
  <div id="parrot-splash" aria-hidden="true">
    <div class="splash-inner">
      <img class="splash-logo" src="/logo.svg" alt="Parrot" width="80" height="80" />
      <div class="splash-spinner"></div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
