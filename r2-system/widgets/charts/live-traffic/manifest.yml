title: "Live Traffic Chart"
description: "Hero line chart with current metrics, annotation and recent series."
component: "LiveTrafficChart"
runtime_type: "live-traffic"
aliases:
  - "animated-line"
category: "charts"
selection_hints:
  - "recent time series"
  - "concurrent activity"
  - "hero metric with trend"
component_id_overrides: []
data_requirements:
  - "chartLabels: Ordered x-axis labels."
  - "chartSeries: Ordered numeric series values."
sql_aliases:
  - alias: "chartLabels"
    path: "data.chartLabels"
    required: true
    sql_type: "string[]"
    expression_hint: "list(period_label ORDER BY period_index)"
    description: "Ordered x-axis labels."
  - alias: "chartSeries"
    path: "data.chartSeries"
    required: true
    sql_type: "number[]"
    expression_hint: "list(metric_value ORDER BY period_index)"
    description: "Ordered numeric series values."
  - alias: "metricCards"
    path: "data.metricCards"
    required: false
    sql_type: "object[]"
    expression_hint: "list(struct_pack(icon := icon_name, label := card_label, value := card_value, delta := card_delta, note := card_note) ORDER BY card_index)"
    description: "Optional summary cards derived from the same query."
  - alias: "chartMin"
    path: "data.chartMin"
    required: false
    sql_type: "number"
    expression_hint: "chartMin"
    description: "Optional explicit lower bound."
  - alias: "chartMax"
    path: "data.chartMax"
    required: false
    sql_type: "number"
    expression_hint: "chartMax"
    description: "Optional explicit upper bound."
  - alias: "annotation"
    path: "data.annotation"
    required: false
    sql_type: "object"
    expression_hint: "struct_pack(index := annotation_index, label := annotation_label, value := annotation_value)"
    description: "Optional highlighted point."
  - alias: "description"
    path: "data.description"
    required: false
    sql_type: "string"
    expression_hint: "description"
    description: "Optional helper copy."
data_structure_template:
  data:
    chartLabels:
      - "Mon"
      - "Tue"
      - "Wed"
      - "Thu"
      - "Fri"
    chartSeries:
      - 320
      - 356
      - 401
      - 462
      - 538
    metricCards:
      - icon: "sparkles"
        label: "Active now"
        value: "538"
        delta: "+8.4%"
        note: "users online"
      - icon: "medal"
        label: "Peak today"
        value: "614"
        delta: "+13.1%"
        note: "highest concurrent users"
    chartMin: 120
    chartMax: 760
    annotation:
      index: 4
      label: "ACTIVE USERS"
      value: "538"
grid_span: "col-span-2"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    chartLabels: "list(period_label ORDER BY period_index)"
    chartSeries: "list(metric_value ORDER BY period_index)"
    metricCards: "list(struct_pack(icon := icon_name, label := card_label, value := card_value, delta := card_delta, note := card_note) ORDER BY card_index)"
    chartMin: "chartMin"
    chartMax: "chartMax"
    annotation: "struct_pack(index := annotation_index, label := annotation_label, value := annotation_value)"
    description: "description"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "live-traffic"
  gridSpan: "col-span-2"
  colorTheme: "theme-productivity"
  data:
    chartLabels:
      - "Mon"
      - "Tue"
      - "Wed"
      - "Thu"
      - "Fri"
    chartSeries:
      - 320
      - 356
      - 401
      - 462
      - 538
    metricCards:
      - icon: "sparkles"
        label: "Active now"
        value: "538"
        delta: "+8.4%"
        note: "users online"
      - icon: "medal"
        label: "Peak today"
        value: "614"
        delta: "+13.1%"
        note: "highest concurrent users"
    chartMin: 120
    chartMax: 760
    annotation:
      index: 4
      label: "ACTIVE USERS"
      value: "538"
