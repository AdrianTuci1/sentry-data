widgets:
  - id: "ActivityHeatmap"
    path: "charts/activity-heatmap"
    title: "Activity Heatmap"
    description: "Shows density or activity distribution across time vs day. Expects a two-dimensional array of coordinates and values (e.g., [day, hour, value]) to render the heatmap's hot spots."

  - id: "Covariance"
    path: "charts/covariance"
    title: "Covariance Matrix"
    description: "A matrix highlighting how multiple indicators vary simultaneously. Expects an array for categories (fields) and an NXN matrix containing the covariance levels (e.g., 0.8 between Spend and Clicks)."

  - id: "IntensityHeat"
    path: "charts/intensity-heat"
    title: "Intensity Heat"
    description: "Displays saturation or fatigue levels (e.g., Ad Fatigue). Expects a single numerical value or string (e.g., '29') representing the overall score."

  - id: "LiquidGauge"
    path: "charts/liquid-gauge"
    title: "Liquid Gauge"
    description: "A liquid-like fluid representation of a percentage out of 100. Expects a sliderValue between 0 and 100 and a unit (e.g., '%')."

  - id: "LiveTraffic"
    path: "charts/live-traffic"
    title: "Live Traffic Chart"
    description: "Simulates or tracks live traffic rhythm. Uses an array of data points representing real-time traffic history over time."

  - id: "OptimalTime"
    path: "charts/optimal-time"
    title: "Optimal Time Heatmap"
    description: "A focus-heatmap to find the perfect action time. The widget expects an array of matrix data (similar to ActivityHeatmap) but visually stylized to highlight the 'hottest moment'."

  - id: "RangeArea"
    path: "charts/range-area"
    title: "Range Area Chart"
    description: "A line chart visually bounding max, min, and average value areas. Requires separate arrays for dates (X-axis) and the min, max, avg data."

  - id: "RealMapbox"
    path: "charts/real-mapbox"
    title: "Mapbox Heatmap"
    description: "A Mapbox geospatial representation for physical heatmaps. Expects an array of coordinates where each marker has a latitude, longitude, and an intensity value."

  - id: "Sankey"
    path: "charts/sankey"
    title: "Sankey Flow"
    description: "A node-link flow diagram illustrating volume across complex funnels. Expects 'nodes' (stages) and 'links' (connections between source and target dictating volume size)."

  - id: "ScatterPlot"
    path: "charts/scatter-plot"
    title: "Scatter Plot"
    description: "A direct data point distribution map. Expects typical two-dimensional value arrays to calculate Cartesian positions along two axes (plus a trendline)."

  - id: "SemiCircleDonut"
    path: "charts/semi-circle-donut"
    title: "Semi-Circle Donut"
    description: "A half-circle donut chart displaying 100% distribution proportions. Expects a list of platforms containing name, value, and color."

  - id: "StreamGraph"
    path: "charts/stream-graph"
    title: "Stream Graph"
    description: "A solid and fluid line chart with multiple trend layers evolving over time. Expects a three-dimensional stream structure: [date, amount, category]."

  - id: "WaffleChart"
    path: "charts/waffle-chart"
    title: "Waffle Chart"
    description: "Presents what percentage of a total is occupied by a single constant variable across a 10x10 matrix. Expects a global 'value' (0-100) and an optional color theme."

  - id: "CreativeQuadrant"
    path: "creative/creative-quadrant"
    title: "Creative Performance Quadrant"
    description: "A 2x2 matrix plotting ad creatives based on Engagement vs Cost Efficiency. Expects a list of distinct items (e.g., [ROAS, CPA, video_name, type])."

  - id: "BudgetSensitivity"
    path: "financial/budget-sensitivity"
    title: "Budget Sensitivity"
    description: "A mathematical illustration of an economic utility curve. Expects data formatted as test results plotted against budget thresholds vs expected outcomes (e.g., [budget_drop, conversion_drop])."

  - id: "Waterfall"
    path: "financial/waterfall"
    title: "Net Profit Bridge"
    description: "A waterfall chart applying a Net Profit model where financial data undergoes steps of changes to connect gross revenue with net profit. Expects a 'steps' array."

  - id: "Attribution"
    path: "marketing/attribution"
    title: "Marketing Attribution"
    description: "A bar chart comparing channel scores across different models. Expects an array detailing First Click, Last Click, and Linear Attribution per channel."

  - id: "Cohorts"
    path: "marketing/cohorts"
    title: "Cohorts"
    description: "A retention heatmap showing how user groups behave over time. Expects a 'cohorts' array identifying the starting week cohort and its retention rates month over month."

  - id: "Funnel"
    path: "marketing/funnel"
    title: "Sales Funnel"
    description: "Visualizes the drop-off across sequential stages of a user journey. Expects a linear list of steps per stage containing a value and a name."

  - id: "IncrementalLift"
    path: "marketing/incremental-lift"
    title: "Incremental Lift"
    description: "Highlights the absolute incremental value from an A/B Test. Expects values for Control, Test, and the backend-calculated Incremental lift."

  - id: "IntentSunburst"
    path: "marketing/intent-sunburst"
    title: "Intent Sunburst"
    description: "A radial hierarchical graph mapping how user intent splits into categories. Expects an object tree featuring parents and 'children' for deep-diving behavioral categories."

  - id: "InterestRadar"
    path: "marketing/interest-radar"
    title: "Interest Radar"
    description: "A radar chart displaying multidimensional psychographic or audience profiles. Expects data to be aligned with a predefined set of internal axes/indicators."

  - id: "MarketEvolution"
    path: "marketing/market-evolution"
    title: "Market Evolution"
    description: "A force-directed dynamic layout in Echarts. Visualizes traffic categories as 'Nodes' and their gravitational interactions representing performance as 'Links'."

  - id: "MarketSentiment"
    path: "marketing/market-sentiment"
    title: "Market Sentiment Radar"
    description: "Renders perceived sentiment from backend scores onto a radar graph where max indicator bounds are predefined and data paints the brand's evolutionary snapshot."

  - id: "ShapleyAttribution"
    path: "marketing/shapley-attribution"
    title: "Shapley Attribution"
    description: "A mathematical box-plot evaluating variance over multiple simulation runs. Generates quartile data from millions of Shapley attribution inputs mapping channels vs score variance."

  - id: "AudienceCopilot"
    path: "misc/audience-copilot"
    title: "Audience Copilot"
    description: "An AI-powered conversational interface for generating actionable insights text. Expects a textual segment, action type, and generated impact percentages."

  - id: "ChronoDial"
    path: "misc/chrono-dial"
    title: "Chrono Dial"
    description: "A rapid dashboard radial dial from 0 to 100%. Displays a single numerical value computed by the API using a dynamic pendulum UI."

  - id: "EmotionWave"
    path: "misc/emotion-wave"
    title: "Emotion Wave"
    description: "Visualizes emotion intensity through CSS pre-animated waves. Expects only a simple sentiment score (e.g., 78) which regulates the background UI state."

  - id: "LeadsList"
    path: "misc/leads-list"
    title: "Leads List"
    description: "A compact live-feed widget for freshly acquired leads. Expects arrays containing CRM-like user info (name, status hot/cold, acquisition channel, timestamp)."

  - id: "NeuralNexus"
    path: "misc/neural-nexus"
    title: "Neural Nexus"
    description: "An unusual UI meter where progress is drawn semi-circularly through distinctive ticks. Expects a core neural score indicator from the API."

  - id: "PulseCircle"
    path: "misc/pulse-circle"
    title: "Pulse Circle"
    description: "Simulates living status breathing through an animated ring. Expects a single qualitative integer representing global 'health loop' validity."

  - id: "ScanningOrbit"
    path: "misc/scanning-orbit"
    title: "Scanning Orbit"
    description: "A small live-generator widget. Features a background radar with single dynamic metrics (e.g., 14,000 ops/sec) meant to convey a sci-fi scanning aesthetic."

  - id: "SimpleMicro"
    path: "misc/simple-micro"
    title: "Simple Micrographics"
    description: "A collection of 5 ultra-simple widget card layouts selected via a 'view' parameter. Transforms compact API values into immediate and distinct visuals."

  - id: "TechnicalHealth"
    path: "misc/technical-health"
    title: "Technical Health"
    description: "A short matrix dashboard presenting server technical sensor status. Expects a predefined list of attributes (uptime, latency) annotated with good/warning tags."

  - id: "TrendSpotter"
    path: "misc/trend-spotter"
    title: "Trend Spotter"
    description: "Emerging thematic clouds drawn via invisibly guided proportionally larger texts. Expects keywords mapped with relative weight numbers and trend vectors for color-coding."

  - id: "AnomalyStream"
    path: "ml/anomaly-stream"
    title: "Anomaly Pulse"
    description: "A notification feed strictly for critical ML flag anomalies. Uses the backend timeline to quickly stack newly detected risks as raw streaming logs."

  - id: "LeadClustering"
    path: "ml/lead-clustering"
    title: "Lead Clustering"
    description: "Supervised clustering applied to user leads, organized on a Cartesian plane emphasizing value. Expects an array containing full DB characteristics matched against K-means clusters."

  - id: "Forecast"
    path: "predictive/forecast"
    title: "Predictive Forecast"
    description: "Predictive ML extrapolation connected to the frontend's raw tracking series. Displays parallel arrays (history array and dotted prediction array) rendered beneath a dashed UI highlight."
