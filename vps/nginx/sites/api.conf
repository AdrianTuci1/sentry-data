# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name api.statsparrot.com 37.60.237.145;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API ──
server {
    listen 443 ssl;
    http2 on;
    server_name api.statsparrot.com 37.60.237.145;

    ssl_certificate     /etc/letsencrypt/live/api.statsparrot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.statsparrot.com/privkey.pem;

    client_max_body_size 100M;

    # Proxy to backend (variable-based resolver)
    set $backend_upstream backend:3000;

    location / {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
