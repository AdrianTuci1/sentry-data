title: "Interest Radar"
description: "Radar chart of multidimensional interests or attributes."
component: "InterestRadar"
runtime_type: "interest-radar"
aliases: []
category: "marketing"
selection_hints:
  - "radar profile"
  - "multi-axis attributes"
  - "interest mix"
component_id_overrides: []
data_requirements:
  - "indicator: Radar axes as [{name,max}]."
  - "radarData: Radar series rows."
sql_aliases:
  - alias: "indicator"
    path: "data.indicator"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(name := axis_name, max := axis_max) ORDER BY axis_index)"
    description: "Radar axes as [{name,max}]."
  - alias: "radarData"
    path: "data.radarData"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(name := series_name, value := axis_values, itemStyle := item_style, areaStyle := area_style) ORDER BY series_index)"
    description: "Radar series rows."
data_structure_template:
  data:
    indicator:
      - name: "Technology"
        max: 100
      - name: "Fashion"
        max: 100
    radarData:
      - name: "High Intent"
        value:
          - 85
          - 30
        itemStyle:
          color: "#34D399"
        areaStyle:
          color: "rgba(52, 211, 153, 0.3)"
grid_span: "col-span-2"
color_theme: "theme-audience"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    indicator: "list(struct_pack(name := axis_name, max := axis_max) ORDER BY axis_index)"
    radarData: "list(struct_pack(name := series_name, value := axis_values, itemStyle := item_style, areaStyle := area_style) ORDER BY series_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "interest-radar"
  gridSpan: "col-span-2"
  colorTheme: "theme-audience"
  data:
    indicator:
      - name: "Technology"
        max: 100
      - name: "Fashion"
        max: 100
    radarData:
      - name: "High Intent"
        value:
          - 85
          - 30
        itemStyle:
          color: "#34D399"
        areaStyle:
          color: "rgba(52, 211, 153, 0.3)"
