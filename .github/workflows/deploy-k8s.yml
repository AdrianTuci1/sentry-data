name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/deploy-k8s.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: adriantuci1/sentry-data-backend
  WORKER_IMAGE: adriantuci1/sentry-data-worker
  CHAT_IMAGE: adriantuci1/sentry-data-chat
  HARNESS_IMAGE: adriantuci1/sentry-data-harness
  OBSERVER_IMAGE: adriantuci1/sentry-data-observer
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER || 'sentry-data-cluster' }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION || 'europe-west1' }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push chat image
        uses: docker/build-push-action@v5
        with:
          context: ./services/chat
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.CHAT_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.CHAT_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push harness image
        uses: docker/build-push-action@v5
        with:
          context: ./services/harness
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.HARNESS_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.HARNESS_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push observer image
        uses: docker/build-push-action@v5
        with:
          context: ./services/observer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OBSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OBSERVER_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 🚀 Deploy to GKE
        run: |
          kubectl set image deployment/sentry-data-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n sentry-data
          kubectl set image deployment/sentry-data-chat \
            chat=${{ env.REGISTRY }}/${{ env.CHAT_IMAGE }}:${{ github.sha }} -n sentry-data
          kubectl set image deployment/sentry-data-harness \
            harness=${{ env.REGISTRY }}/${{ env.HARNESS_IMAGE }}:${{ github.sha }} -n sentry-data
          kubectl set image deployment/sentry-data-observer \
            observer=${{ env.REGISTRY }}/${{ env.OBSERVER_IMAGE }}:${{ github.sha }} -n sentry-data
          kubectl set image cronjob/sentry-data-sync-worker \
            worker=${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }} -n sentry-data

      - name: 🏥 Wait for rollout
        run: |
          kubectl rollout status deployment/sentry-data-backend -n sentry-data --timeout=300s
          kubectl rollout status deployment/sentry-data-chat -n sentry-data --timeout=300s
          kubectl rollout status deployment/sentry-data-harness -n sentry-data --timeout=300s
          kubectl rollout status deployment/sentry-data-observer -n sentry-data --timeout=300s
