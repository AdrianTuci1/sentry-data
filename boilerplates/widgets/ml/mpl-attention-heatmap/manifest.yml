title: "Attention Heatmap"
description: "Heatmap matrix with x/y labels and side notes."
component: "MatplotlibAttentionHeatmap"
runtime_type: "mpl-attention-heatmap"
aliases: []
category: "ml"
selection_hints:
  - "activation heatmap"
  - "layer vs block matrix"
  - "drift matrix"
component_id_overrides: []
data_requirements:
  - "xLabels: Ordered column labels."
  - "yLabels: Ordered row labels."
  - "matrix: Matrix values aligned to xLabels/yLabels."
sql_aliases:
  - alias: "xLabels"
    path: "data.xLabels"
    required: true
    sql_type: "string[]"
    expression_hint: "list(column_label ORDER BY column_index)"
    description: "Ordered column labels."
  - alias: "yLabels"
    path: "data.yLabels"
    required: true
    sql_type: "string[]"
    expression_hint: "list(row_label ORDER BY row_index)"
    description: "Ordered row labels."
  - alias: "matrix"
    path: "data.matrix"
    required: true
    sql_type: "number[][]"
    expression_hint: "list(row_values ORDER BY row_index)"
    description: "Matrix values aligned to xLabels/yLabels."
  - alias: "sideNotes"
    path: "data.sideNotes"
    required: false
    sql_type: "object[]"
    expression_hint: "list(struct_pack(label := note_label, value := note_value) ORDER BY note_index)"
    description: "Summary notes shown to the right."
data_structure_template:
  data:
    xLabels:
      - "B1"
      - "B2"
      - "B3"
    yLabels:
      - "L0"
      - "L8"
      - "L16"
    matrix:
      - - 0.19
        - 0.24
        - 0.28
      - - 0.22
        - 0.26
        - 0.31
      - - 0.24
        - 0.3
        - 0.35
    sideNotes:
      - label: "drift peak"
        value: "L32 / B6"
grid_span: "col-span-2 row-span-2"
color_theme: "theme-natural"
sdui:
  root_key: "data"
  mapping_mode: "matrix"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "matrix"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    xLabels: "list(column_label ORDER BY column_index)"
    yLabels: "list(row_label ORDER BY row_index)"
    matrix: "list(row_values ORDER BY row_index)"
    sideNotes: "list(struct_pack(label := note_label, value := note_value) ORDER BY note_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "mpl-attention-heatmap"
  gridSpan: "col-span-2 row-span-2"
  colorTheme: "theme-natural"
  data:
    xLabels:
      - "B1"
      - "B2"
      - "B3"
    yLabels:
      - "L0"
      - "L8"
      - "L16"
    matrix:
      - - 0.19
        - 0.24
        - 0.28
      - - 0.22
        - 0.26
        - 0.31
      - - 0.24
        - 0.3
        - 0.35
    sideNotes:
      - label: "drift peak"
        value: "L32 / B6"
