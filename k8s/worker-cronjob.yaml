apiVersion: batch/v1
kind: CronJob
metadata:
  name: sentry-data-sync-worker
  namespace: sentry-data
  labels:
    app.kubernetes.io/name: sentry-data
    app.kubernetes.io/component: worker
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sentry-data
            app.kubernetes.io/component: worker
        spec:
          imagePullSecrets:
            - name: ghcr-pull
          restartPolicy: OnFailure
          containers:
            - name: worker
              image: ghcr.io/adriantuci1/sentry-data-worker:CHANGEME
              envFrom:
                - configMapRef:
                    name: sentry-data-config
              env:
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: JWT_SECRET
                - name: REFRESH_TOKEN_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: REFRESH_TOKEN_SECRET
                - name: INTERNAL_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: INTERNAL_TOKEN
                - name: LLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: LLM_API_KEY
                - name: GOOGLE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: GOOGLE_CLIENT_ID
                - name: GOOGLE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: sentry-data-secrets
                      key: GOOGLE_CLIENT_SECRET
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /secrets/gcp-key.json
              volumeMounts:
                - name: gcp-key
                  mountPath: /secrets
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: gcp-key
              secret:
                secretName: sentry-data-gcp-key
                items:
                  - key: gcp-key.json
                    path: gcp-key.json
