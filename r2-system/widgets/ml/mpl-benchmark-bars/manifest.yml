title: "Benchmark Bars"
description: "Ranked benchmark bars with score, target and delta."
component: "MatplotlibBenchmarkBars"
runtime_type: "mpl-benchmark-bars"
aliases: []
category: "ml"
selection_hints:
  - "benchmark comparison"
  - "threshold pass/fail"
  - "eval guardrails"
component_id_overrides: []
data_requirements:
  - "benchmarks: Ordered benchmark rows."
sql_aliases:
  - alias: "benchmarks"
    path: "data.benchmarks"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(label := benchmark_name, score := score_value, target := target_value, delta := delta_text) ORDER BY benchmark_order)"
    description: "Ordered benchmark rows."
data_structure_template:
  data:
    benchmarks:
      - label: "MMLU"
        score: 73.2
        target: 72
        delta: "+1.1"
      - label: "GSM8K"
        score: 61.8
        target: 60
        delta: "+2.8"
grid_span: "row-span-2"
color_theme: "theme-audience"
sdui:
  root_key: "data"
  mapping_mode: "list"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "list"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    benchmarks: "list(struct_pack(label := benchmark_name, score := score_value, target := target_value, delta := delta_text) ORDER BY benchmark_order)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "mpl-benchmark-bars"
  gridSpan: "row-span-2"
  colorTheme: "theme-audience"
  data:
    benchmarks:
      - label: "MMLU"
        score: 73.2
        target: 72
        delta: "+1.1"
      - label: "GSM8K"
        score: 61.8
        target: 60
        delta: "+2.8"
