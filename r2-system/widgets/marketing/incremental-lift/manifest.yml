title: "Incremental Lift"
description: "Three-bar comparison for organic, paid and incremental contribution."
component: "IncrementalLift"
runtime_type: "incremental-lift"
aliases: []
category: "marketing"
selection_hints:
  - "control vs test"
  - "incremental value"
  - "lift decomposition"
component_id_overrides: []
data_requirements:
  - "bars: Ordered bars to display."
sql_aliases:
  - alias: "bars"
    path: "data.bars"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(label := bucket_label, value := metric_value, color := color_hex, deltaLabel := annotation_text) ORDER BY bucket_index)"
    description: "Ordered bars to display."
data_structure_template:
  data:
    bars:
      - label: "Organic"
        value: 4200
        color: "#3B82F6"
      - label: "Paid"
        value: 2800
        color: "#8B5CF6"
      - label: "Incremental"
        value: 1200
        color: "#10B981"
        deltaLabel: "+22%"
grid_span: "default"
color_theme: "theme-revenue"
sdui:
  root_key: "data"
  mapping_mode: "list"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "list"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    bars: "list(struct_pack(label := bucket_label, value := metric_value, color := color_hex, deltaLabel := annotation_text) ORDER BY bucket_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "incremental-lift"
  gridSpan: "default"
  colorTheme: "theme-revenue"
  data:
    bars:
      - label: "Organic"
        value: 4200
        color: "#3B82F6"
      - label: "Paid"
        value: 2800
        color: "#8B5CF6"
      - label: "Incremental"
        value: 1200
        color: "#10B981"
        deltaLabel: "+22%"
