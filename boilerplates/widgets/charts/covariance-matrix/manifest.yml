title: "Covariance Matrix"
description: "Square matrix comparing relationships between multiple features."
component: "CovarianceMatrix"
runtime_type: "covariance-matrix"
aliases: []
category: "charts"
selection_hints:
  - "feature correlation"
  - "covariance"
  - "NxN matrix"
component_id_overrides: []
data_requirements:
  - "fields: Ordered list of matrix dimensions."
  - "matrix: Square matrix values aligned with fields."
sql_aliases:
  - alias: "fields"
    path: "data.fields"
    required: true
    sql_type: "string[]"
    expression_hint: "list(feature_name ORDER BY feature_index)"
    description: "Ordered list of matrix dimensions."
  - alias: "matrix"
    path: "data.matrix"
    required: true
    sql_type: "number[][]"
    expression_hint: "list(row_values ORDER BY row_index)"
    description: "Square matrix values aligned with fields."
data_structure_template:
  data:
    fields:
      - "Spend"
      - "Clicks"
      - "Conversions"
    matrix:
      - - 1
        - 0.8
        - 0.4
      - - 0.8
        - 1
        - 0.6
      - - 0.4
        - 0.6
        - 1
grid_span: "col-span-2 row-span-2"
color_theme: "theme-audience"
sdui:
  root_key: "data"
  mapping_mode: "matrix"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "matrix"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    fields: "list(feature_name ORDER BY feature_index)"
    matrix: "list(row_values ORDER BY row_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "covariance-matrix"
  gridSpan: "col-span-2 row-span-2"
  colorTheme: "theme-audience"
  data:
    fields:
      - "Spend"
      - "Clicks"
      - "Conversions"
    matrix:
      - - 1
        - 0.8
        - 0.4
      - - 0.8
        - 1
        - 0.6
      - - 0.4
        - 0.6
        - 1
