title: "High-Intent Leads List"
description: "A table listing specific actionable entities (leads, users, devices) with their status and scores."
data_requirements: ["entity_name", "score_value", "status_label", "timestamp"]
sql_aliases:
  - name: "full name of the lead"
  - value: "numeric score or category"
  - status: "status string (hot, warm, cold)"
  - time: "relative or absolute time"
data_structure_template:
  leads:
    - { name: "John Doe", value: "95", status: "hot", time: "2m ago" }
    - { name: "Jane Smith", value: "80", status: "warm", time: "15m ago" }
grid_span: "default"
sdui:
  mapping_mode: "list"
  root_key: "leads"
