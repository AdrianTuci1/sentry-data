title: "Funnel"
description: "Hero funnel with summary headline and stage marker pills."
component: "FunnelChart"
runtime_type: "funnel"
aliases: []
category: "marketing"
selection_hints:
  - "stage drop-off"
  - "journey funnel"
  - "hero conversion flow"
component_id_overrides: []
data_requirements:
  - "stageColumns: Three stage markers for the visual envelope."
sql_aliases:
  - alias: "summaryLabel"
    path: "data.summaryLabel"
    required: false
    sql_type: "string"
    expression_hint: "summaryLabel"
    description: "Headline label."
  - alias: "summaryValue"
    path: "data.summaryValue"
    required: false
    sql_type: "string"
    expression_hint: "summaryValue"
    description: "Headline value."
  - alias: "summaryDelta"
    path: "data.summaryDelta"
    required: false
    sql_type: "string"
    expression_hint: "summaryDelta"
    description: "Headline delta."
  - alias: "summaryCompare"
    path: "data.summaryCompare"
    required: false
    sql_type: "string"
    expression_hint: "summaryCompare"
    description: "Supporting comparison text."
  - alias: "stageColumns"
    path: "data.stageColumns"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(top := stage_label, metric := stage_value, bottom := stage_note) ORDER BY stage_index)"
    description: "Three stage markers for the visual envelope."
data_structure_template:
  data:
    summaryLabel: "Income"
    summaryValue: "$38,420"
    summaryDelta: "↑4.2%"
    summaryCompare: "Compared to $36,870 last month"
    stageColumns:
      - top: "Visits"
        metric: "100"
      - top: "Lead"
        metric: "56"
      - top: "Purchase"
        metric: "14"
grid_span: "col-span-2"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    summaryLabel: "summaryLabel"
    summaryValue: "summaryValue"
    summaryDelta: "summaryDelta"
    summaryCompare: "summaryCompare"
    stageColumns: "list(struct_pack(top := stage_label, metric := stage_value, bottom := stage_note) ORDER BY stage_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "funnel"
  gridSpan: "col-span-2"
  colorTheme: "theme-productivity"
  data:
    summaryLabel: "Income"
    summaryValue: "$38,420"
    summaryDelta: "↑4.2%"
    summaryCompare: "Compared to $36,870 last month"
    stageColumns:
      - top: "Visits"
        metric: "100"
      - top: "Lead"
        metric: "56"
      - top: "Purchase"
        metric: "14"
