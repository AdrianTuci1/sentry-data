title: "Range Area Chart"
description: "A line chart showing min, max, and average bounds with a shaded confidence intervals."
data_structure_template:
  dates: ['08:00', '10:00', '12:00']
  maxData: [120, 150, 200]
  avgData: [80, 110, 150]
  minData: [40, 70, 100]
grid_span: "col-span-2 row-span-2"
sdui:
  mapping_mode: "list"
  root_key: "rangeData"
