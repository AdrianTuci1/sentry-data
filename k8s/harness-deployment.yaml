apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-data-harness
  namespace: sentry-data
  labels:
    app.kubernetes.io/name: sentry-data
    app.kubernetes.io/component: harness
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentry-data
      app.kubernetes.io/component: harness
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentry-data
        app.kubernetes.io/component: harness
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: harness
          image: ghcr.io/adriantuci1/sentry-data-harness:4e5031b96958ebb8367c98be164216037d1fe47a
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: sentry-data-config
          env:
            - name: PORT
              value: "8081"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: INTERNAL_TOKEN
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: LLM_API_KEY
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp-key.json
          volumeMounts:
            - name: gcp-key
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'curl -fsS -H "X-Internal-Token: $INTERNAL_TOKEN" http://localhost:8081/health'
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'curl -fsS -H "X-Internal-Token: $INTERNAL_TOKEN" http://localhost:8081/health'
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: gcp-key
          secret:
            secretName: sentry-data-gcp-key
            items:
              - key: gcp-key.json
                path: gcp-key.json
