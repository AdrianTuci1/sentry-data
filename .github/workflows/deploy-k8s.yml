name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/deploy-k8s.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: adriantuci1/sentry-data-backend
  WORKER_IMAGE: adriantuci1/sentry-data-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tags in Kubernetes manifests
        run: |
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" k8s/deployment.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:.*|image: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}|" k8s/worker-cronjob.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml k8s/worker-cronjob.yaml
          git diff --staged --quiet || git commit -m "chore: update sentry-data images to ${{ github.sha }} [skip ci]"
          git push
