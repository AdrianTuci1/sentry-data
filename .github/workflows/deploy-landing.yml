name: 🏠 Deploy Landing Page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'landing/**'

env:
  DOMAIN: ${{ vars.DOMAIN || 'statsparrot.com' }}

jobs:
  deploy-landing:
    name: 🏠 Deploy Landing Page to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package.json

      - name: 🔨 Build Landing Page
        id: build
        run: |
          cd landing
          npm ci
          npm run build

      - name: 🏗️ Ensure Cloudflare Pages Project exists
        id: cf_project
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"statsparrot-landing","production_branch":"main"}' || true
          echo "Pages project ready"

      - name: 🚀 Deploy Landing Page to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: statsparrot-landing
          directory: landing/dist
          productionBranch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Log Result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Landing page deployed to https://${{ env.DOMAIN }}"
          else
            echo "❌ Landing page deploy failed"
            exit 1
          fi
