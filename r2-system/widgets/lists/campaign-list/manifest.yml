title: "Campaign List"
description: "Compact ranked list with label, value and directional trend."
component: "CampaignListMicro"
runtime_type: "campaign-list"
aliases:
  - "campaigns"
category: "lists"
selection_hints:
  - "ranked list"
  - "campaign leaderboard"
  - "compact comparison"
component_id_overrides: []
data_requirements:
  - "campaigns: List of campaign rows."
sql_aliases:
  - alias: "campaigns"
    path: "data.campaigns"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(name := label_col, value := metric_col, trend := trend_sign) ORDER BY metric_sort DESC)"
    description: "List of campaign rows."
data_structure_template:
  data:
    campaigns:
      - name: "Google"
        value: "18.4K"
        trend: "+"
      - name: "Meta"
        value: "15.1K"
        trend: "-"
grid_span: "row-span-2"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "list"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "list"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    campaigns: "list(struct_pack(name := label_col, value := metric_col, trend := trend_sign) ORDER BY metric_sort DESC)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "campaign-list"
  gridSpan: "row-span-2"
  colorTheme: "theme-productivity"
  data:
    campaigns:
      - name: "Google"
        value: "18.4K"
        trend: "+"
      - name: "Meta"
        value: "15.1K"
        trend: "-"
