name: 🌐 Deploy Frontend Only

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

env:
  DOMAIN: ${{ vars.DOMAIN || 'statsparrot.com' }}

jobs:
  deploy-frontend:
    name: 🌐 Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: 🔨 Build Frontend
        id: build
        run: |
          cd frontend
          cat > .env.production << ENVEOF
          VITE_API_URL=https://api.${{ env.DOMAIN }}/api/v1
          VITE_DEV_MODE=false
          ENVEOF
          npm ci
          npm run build

      - name: 🏗️ Ensure Cloudflare Pages Project exists
        id: cf_project
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"statsparrot-app","production_branch":"main"}' || true
          echo "Pages project ready"

      - name: 🚀 Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: statsparrot-app
          directory: frontend/dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Log Result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Frontend deployed to https://app.${{ env.DOMAIN }}"
          else
            echo "❌ Frontend deploy failed"
            exit 1
          fi
