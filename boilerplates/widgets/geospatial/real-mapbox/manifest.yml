title: "Mapbox / Globe"
description: "Map or globe view fed by a list of geographic points and optional projection config."
component: "RealMapbox"
runtime_type: "real-mapbox"
aliases:
  - "3d-map"
category: "geospatial"
selection_hints:
  - "geo distribution"
  - "global map"
  - "regional hotspots"
component_id_overrides: []
data_requirements:
  - "locations: List of map points with name and coordinates."
sql_aliases:
  - alias: "locations"
    path: "data.locations"
    required: true
    sql_type: "object[]"
    expression_hint: "list(struct_pack(name := label_col, address := address_col, longitude := lon_col, latitude := lat_col, intensity := score_col) ORDER BY score_col DESC)"
    description: "List of map points with name and coordinates."
  - alias: "mapProjection"
    path: "data.mapProjection"
    required: false
    sql_type: "string"
    expression_hint: "mapProjection"
    description: "mercator or globe."
  - alias: "mapCenter"
    path: "data.mapCenter"
    required: false
    sql_type: "number[]"
    expression_hint: "mapCenter"
    description: "Optional [lon, lat] center."
  - alias: "mapZoom"
    path: "data.mapZoom"
    required: false
    sql_type: "number"
    expression_hint: "mapZoom"
    description: "Optional zoom."
  - alias: "mapPitch"
    path: "data.mapPitch"
    required: false
    sql_type: "number"
    expression_hint: "mapPitch"
    description: "Optional pitch."
  - alias: "mapBearing"
    path: "data.mapBearing"
    required: false
    sql_type: "number"
    expression_hint: "mapBearing"
    description: "Optional bearing."
  - alias: "mapAutoRotate"
    path: "data.mapAutoRotate"
    required: false
    sql_type: "boolean"
    expression_hint: "mapAutoRotate"
    description: "Enable globe rotation."
  - alias: "mapRotationSpeed"
    path: "data.mapRotationSpeed"
    required: false
    sql_type: "number"
    expression_hint: "mapRotationSpeed"
    description: "Rotation speed when auto-rotate is enabled."
  - alias: "mapFitBounds"
    path: "data.mapFitBounds"
    required: false
    sql_type: "boolean"
    expression_hint: "mapFitBounds"
    description: "Auto-fit markers."
data_structure_template:
  data:
    locations:
      - name: "Bucharest"
        address: "Bucharest"
        longitude: 26.1025
        latitude: 44.4268
        intensity: 4
    mapProjection: "globe"
    mapAutoRotate: true
    mapCenter:
      - 12
      - 20
    mapZoom: 1.18
grid_span: "col-span-2 row-span-2"
color_theme: "theme-audience"
sdui:
  root_key: "data"
  mapping_mode: "list"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "list"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    locations: "list(struct_pack(name := label_col, address := address_col, longitude := lon_col, latitude := lat_col, intensity := score_col) ORDER BY score_col DESC)"
    mapProjection: "mapProjection"
    mapCenter: "mapCenter"
    mapZoom: "mapZoom"
    mapPitch: "mapPitch"
    mapBearing: "mapBearing"
    mapAutoRotate: "mapAutoRotate"
    mapRotationSpeed: "mapRotationSpeed"
    mapFitBounds: "mapFitBounds"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "real-mapbox"
  gridSpan: "col-span-2 row-span-2"
  colorTheme: "theme-audience"
  data:
    locations:
      - name: "Bucharest"
        address: "Bucharest"
        longitude: 26.1025
        latitude: 44.4268
        intensity: 4
    mapProjection: "globe"
    mapAutoRotate: true
    mapCenter:
      - 12
      - 20
    mapZoom: 1.18
