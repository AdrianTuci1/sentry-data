# Frontend MindMap Node Manifest
# ---------------------------------------------------------
# HIERARCHY: connector > actionType > adjustedData > group > insight

# 1. CORE DISCOVERY SCHEMAS
# ---------------------------------------------------------
schemas:
  status_node: &status_node
    id: "string (unique)"
    name: "string"
    status: "enum (ok, warning, error)"
    issue: "string (optional)"

  column_node:
    <<: *status_node
    type: "string (Integer, Float, String, Date, Boolean)"

  metric_node:
    <<: *status_node
    value: "string (e.g. '$1.2M', '98%', 'Calculated')"

# 2. HIERARCHICAL LAYERS
# ---------------------------------------------------------
# These are the keys AI agents MUST use in AGENT_DISCOVERY: { ... }
# Use prefixes (e.g. cnn_, act_, org_, adj_) to ensure uniqueness.

layers:
  connector:
    description: "The primary data provider (e.g. Shopify, Google)."
    schema: "status_node"
  
  actionType:
    description: "The ingestion method (e.g. batch, stream)."
    schema: "status_node"

  adjustedData:
    description: "The Gold Layer / Feature Engineered datasets."
    items_key: "columns"
    schema: "column_node"
    lineage:
      parent_key: "action_type_id"

  group:
    description: "Logical groupings for insights (e.g. Executive KPI)."
    schema:
      id: "string (unique)"
      title: "string"
      adjusted_data_ids: ["string (IDs of adjustedData used by insights in this group)"]

  insight:
    description: "Individual visual widgets (The WIDGET CATALOG)."
    schema:
      id: "string (unique)"
      title: "string"
      type: "string (WIDGET_ID)"
      query: "string (DuckDB SQL)"
      group_id: "string (Must match group.id)"
      lineage:
        source_keys: ["string (adjustedData_ids)"]
      adjusted_data_columns: ["string (column names used in query)"]

# ---------------------------------------------------------
# SOVEREIGN REPORTING PROTOCOL
# ---------------------------------------------------------
# 1. CONTEXT: feature_engineer.py reports adjustedData + lineage (act > cnn).
# 2. INSIGHTS: query_generator.py reports groups + insights.
# 3. NO SILVER: Do NOT report raw tables/columns from Silver layer to MindMap.
