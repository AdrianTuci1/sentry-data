title: "Gauge Panel"
description: "Circular gauge showing one percentage-like score."
component: "GaugePanelMicro"
runtime_type: "gauge-panel"
aliases:
  - "radial-gauge"
category: "micro"
selection_hints:
  - "single percentage"
  - "utilization"
  - "coverage"
component_id_overrides:
  - "ai-coverage"
data_requirements:
  - "value: Display value or label at the center."
  - "sliderValue: 0-100 numeric gauge value."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Display value or label at the center."
  - alias: "sliderValue"
    path: "data.sliderValue"
    required: true
    sql_type: "number"
    expression_hint: "sliderValue"
    description: "0-100 numeric gauge value."
  - alias: "gaugeUnit"
    path: "data.gaugeUnit"
    required: false
    sql_type: "string"
    expression_hint: "gaugeUnit"
    description: "Gauge unit suffix."
  - alias: "gaugeColor"
    path: "data.gaugeColor"
    required: false
    sql_type: "string"
    expression_hint: "gaugeColor"
    description: "Optional hex color."
data_structure_template:
  data:
    value: "98"
    sliderValue: 98
    gaugeUnit: "%"
    gaugeColor: "#6ae3a7"
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    sliderValue: "sliderValue"
    gaugeUnit: "gaugeUnit"
    gaugeColor: "gaugeColor"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "gauge-panel"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "98"
    sliderValue: 98
    gaugeUnit: "%"
    gaugeColor: "#6ae3a7"
