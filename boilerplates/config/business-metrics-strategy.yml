version: "4.0"
description: "Business Metrics Wishlist - A list of desired KPIs for the AI Agent to target."

metrics_wishlist:
  # --- Marketing & E-Commerce ---
  - title: "Total Revenue"
    description: "Monetary sum of all transactions."
  - title: "Order Volume"
    description: "Daily transaction count trends."
  - title: "Conversion Rate"
    description: "Percentage of visitors completing a purchase."
  - title: "Average Order Value"
    description: "Mean revenue per transaction."
  - title: "Traffic Intent"
    description: "Breakdown of visitor buying intent."
  - title: "Shapley Attribution"
    description: "Fair-value channel contribution model."
  - title: "Keyword Early Warning"
    description: "Emerging market signals and trend spotting."
  - title: "Retention Analysis"
    description: "User stickiness and cohort retention."
  - title: "Sales Funnel"
    description: "Conversion dropout stages."
  - title: "Market Sentiment"
    description: "Customer perception across multiple dimensions."

  # --- SaaS Specific Metrics ---
  - title: "Monthly Recurring Revenue"
    description: "MRR pulse for subscription models."
  - title: "Churn Rate"
    description: "Identification of users at risk of leaving."
  - title: "Customer Lifetime Value"
    description: "Projected total value of a customer over time."
  - title: "Expansion Revenue"
    description: "Revenue from upsells and cross-sells."
  - title: "Feature Adoption"
    description: "User engagement depth with core product features."

  # --- Operational & ML Performance ---
  - title: "Model Saturation"
    description: "Intelligence signal strength vs noise."
  - title: "Anomaly Stream"
    description: "Real-time detection of data irregularities."
  - title: "Creative Performance"
    description: "Efficiency vs Spend matrix for ad creatives."
  - title: "Budget Pacing"
    description: "Spend velocity relative to monthly budget."
  - title: "Audience Overlap"
    description: "Intersection between different customer segments."
  - title: "Project Vitals"
    description: "System-level health and processing status."
  - title: "Attribution Shift"
    description: "Day-over-day changes in credited conversions."
  - title: "Lead Quality"
    description: "Grouping of leads by conversion probability."
  - title: "Spending Elasticity"
    description: "ROI impact of budget fluctuations."
  - title: "Emotion Sentiment"
    description: "Dynamic sentiment wave from text analysis."
