title: "Predictive Forecast"
description: "Historical series with forecast extension and optional confidence bands."
component: "PredictiveForecast"
runtime_type: "predictive"
aliases: []
category: "predictive"
selection_hints:
  - "forecast"
  - "projection"
  - "historical plus future"
component_id_overrides: []
data_requirements:
  - "historical: Ordered historical values."
  - "forecast: Ordered predicted future values."
sql_aliases:
  - alias: "historical"
    path: "data.historical"
    required: true
    sql_type: "number[]"
    expression_hint: "list(actual_value ORDER BY period_index)"
    description: "Ordered historical values."
  - alias: "forecast"
    path: "data.forecast"
    required: true
    sql_type: "number[]"
    expression_hint: "list(predicted_value ORDER BY forecast_index)"
    description: "Ordered predicted future values."
  - alias: "confidenceRange"
    path: "data.confidenceRange"
    required: false
    sql_type: "number[]"
    expression_hint: "list(confidence_value ORDER BY band_index)"
    description: "Optional confidence band markers."
data_structure_template:
  data:
    historical:
      - 320
      - 335
      - 310
      - 350
      - 380
      - 400
    forecast:
      - 410
      - 425
      - 440
      - 435
      - 452
    confidenceRange:
      - 30
      - 45
      - 60
grid_span: "col-span-2"
color_theme: "theme-revenue"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    historical: "list(actual_value ORDER BY period_index)"
    forecast: "list(predicted_value ORDER BY forecast_index)"
    confidenceRange: "list(confidence_value ORDER BY band_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "predictive"
  gridSpan: "col-span-2"
  colorTheme: "theme-revenue"
  data:
    historical:
      - 320
      - 335
      - 310
      - 350
      - 380
      - 400
    forecast:
      - 410
      - 425
      - 440
      - 435
      - 452
    confidenceRange:
      - 30
      - 45
      - 60
