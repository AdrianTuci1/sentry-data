services:
  backend:
    image: sentry-backend:latest
    container_name: sentry-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-europe-west1}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - BIGQUERY_DATASET_PREFIX=${BIGQUERY_DATASET_PREFIX:-sentry_dataset}
      - BIGQUERY_LOCATION=${BIGQUERY_LOCATION:-EU}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL}
      - HARNESS_SERVICE_URL=${HARNESS_SERVICE_URL}
      - OBSERVER_SERVICE_URL=${OBSERVER_SERVICE_URL}
      - CLOUD_RUN_AUTH_MODE=${CLOUD_RUN_AUTH_MODE:-disabled}
      - ENABLE_BIGQUERY_ANALYTICS=${ENABLE_BIGQUERY_ANALYTICS:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://app.statsparrot.com}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.statsparrot.com}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://api.statsparrot.com/api/v1/auth/google/callback}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - sentry-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/health && curl -f http://localhost:3000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      chat:
        condition: service_healthy
      harness:
        condition: service_healthy
      observer:
        condition: service_healthy

  chat:
    image: sentry-chat:latest
    container_name: sentry-chat
    restart: unless-stopped
    environment:
      - PORT=8080
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-flash}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-deepseek-v4-flash}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000/api/v1}
      - HARNESS_SERVICE_URL=${HARNESS_SERVICE_URL:-http://harness:8081}
      - OBSERVER_SERVICE_URL=${OBSERVER_SERVICE_URL:-http://observer:8082}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - sentry-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  harness:
    image: sentry-harness:latest
    container_name: sentry-harness
    restart: unless-stopped
    environment:
      - PORT=8081
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-flash}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-deepseek-v4-flash}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - GCS_BUCKET=${GCS_BUCKET_NAME:-sentry-platform-data}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - sentry-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  observer:
    image: sentry-observer:latest
    container_name: sentry-observer
    restart: unless-stopped
    environment:
      - PORT=8082
      - GCS_BUCKET=${GCS_BUCKET_NAME:-sentry-platform-data}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000/api/v1}
      - HARNESS_SERVICE_URL=http://harness:8081
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
      - BQ_LOCATION=${BIGQUERY_LOCATION:-EU}
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - sentry-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: sentry-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites-enabled:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - sentry-network
    depends_on:
      backend:
        condition: service_healthy
      certbot:
        condition: service_started
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: sentry-certbot
    restart: unless-stopped
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Optional: Sync worker (can also be Cloud Run Job)
  sync-worker:
    image: sentry-sync-worker:latest
    container_name: sentry-sync-worker
    restart: "no"
    environment:
      - NODE_ENV=production
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-europe-west1}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - BIGQUERY_DATASET_PREFIX=${BIGQUERY_DATASET_PREFIX:-sentry_dataset}
      - BIGQUERY_LOCATION=${BIGQUERY_LOCATION:-EU}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - sentry-network
    command: ["node", "src/worker/syncWorker.js"]
    # Run every 5 minutes via the scheduler service below.

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: sentry-scheduler
    restart: unless-stopped
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sentry-network
    labels:
      ofelia.job-run.sync-worker.schedule: "*/5 * * * *"
      ofelia.job-run.sync-worker.container: "sentry-sync-worker"

  # ── Observability ──
  prometheus:
    image: prom/prometheus:latest
    container_name: sentry-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - sentry-network
    # Not exposed externally — queried via backend proxy only

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sentry-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - sentry-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sentry-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - sentry-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: sentry-nginx-exporter
    restart: unless-stopped
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx-status'
    networks:
      - sentry-network

networks:
  sentry-network:
    driver: bridge

volumes:
  certbot-data:
  certbot-www:
  prometheus-data:
