title: Simple Graphics
description: "A collection of micro-visualizations (weather, natural patterns, color sliders) for adding aesthetic highlights or simplified status indicators."
data_requirements: ["value", "unit"]
sql_aliases:
  - value: "display value"
  - unit: "unit label"
  - sliderValue: "slider position (0-100)"
data_structure_template:
  value: "4.8"
  unit: "x"
  sliderValue: 65
  color: "#81E4B5"
  footerTextLeft: "Target: $20"
  footerTextRight: "Limit: $35"
  campaigns:
    - { name: "Google Ads", value: "4.2k", trend: "+" }
    - { name: "Meta Ads", value: "1.8k", trend: "-" }
    - { name: "Organic Search", value: "1.1k", trend: "+" }
  dataPoints: [12, 18, 15, 22, 30, 25, 35]
  bars: [45, 75, 50, 95, 70]
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  mapping_mode: single
  root_key: data
