title: "Metric Trend"
description: "Single KPI card with optional unit and period-over-period delta."
component: "MetricTrendMicro"
runtime_type: "metric-trend"
aliases:
  - "trend"
  - "delta-kpi"
category: "micro"
selection_hints:
  - "single KPI"
  - "delta vs previous period"
  - "executive summary"
component_id_overrides:
  - "marketing-roas"
  - "refresh-cycle"
  - "viral-k-factor"
data_requirements:
  - "value: Primary KPI value shown in large type."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Primary KPI value shown in large type."
  - alias: "unit"
    path: "data.unit"
    required: false
    sql_type: "string"
    expression_hint: "unit"
    description: "Optional unit such as %, x, min or pts."
  - alias: "trendValue"
    path: "data.trendValue"
    required: false
    sql_type: "string"
    expression_hint: "trendValue"
    description: "Formatted delta value such as +4.2% or -3 pts."
  - alias: "trendDirection"
    path: "data.trendDirection"
    required: false
    sql_type: "string"
    expression_hint: "trendDirection"
    description: "up, down or flat."
  - alias: "trendTone"
    path: "data.trendTone"
    required: false
    sql_type: "string"
    expression_hint: "trendTone"
    description: "positive, neutral or negative."
  - alias: "trendLabel"
    path: "data.trendLabel"
    required: false
    sql_type: "string"
    expression_hint: "trendLabel"
    description: "Short comparison label like vs yesterday."
data_structure_template:
  data:
    value: "4.8"
    unit: "x"
    trendValue: "+0.7x"
    trendDirection: "up"
    trendTone: "positive"
    trendLabel: "vs yesterday"
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    unit: "unit"
    trendValue: "trendValue"
    trendDirection: "trendDirection"
    trendTone: "trendTone"
    trendLabel: "trendLabel"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "metric-trend"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "4.8"
    unit: "x"
    trendValue: "+0.7x"
    trendDirection: "up"
    trendTone: "positive"
    trendLabel: "vs yesterday"
