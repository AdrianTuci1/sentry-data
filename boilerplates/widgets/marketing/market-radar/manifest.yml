title: Market Radar
description: "A radar (spider) chart showing brand performance or sentiment across multiple dimensions like 'Price', 'Quality', 'Service', and 'Innovation'."
data_requirements: ["dimension", "value", "category"]
sql_aliases:
  - axis: "dimension name"
  - weight: "numeric value"
  - group: "brand or category"
data_structure_template:
  data: [{ "axis": "Quality", "weight": 85, "group": "Our Brand" }]
grid_span: "default"
color_theme: "theme-audience"
sdui:
  mapping_mode: single
  root_key: data
