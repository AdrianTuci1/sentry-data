title: "Uptime Strip"
description: "Compact uptime card with bar states and current uptime value."
component: "UptimeStripMicro"
runtime_type: "uptime-strip"
aliases: []
category: "micro"
selection_hints:
  - "uptime window"
  - "availability strip"
  - "health streak"
component_id_overrides:
  - "technical-health"
data_requirements:
  - "value: Primary uptime or availability value."
  - "uptimeBars: Ordered list of status tokens: good, warn, down."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Primary uptime or availability value."
  - alias: "unit"
    path: "data.unit"
    required: false
    sql_type: "string"
    expression_hint: "unit"
    description: "Value suffix."
  - alias: "uptimeBars"
    path: "data.uptimeBars"
    required: true
    sql_type: "string[]"
    expression_hint: "list(status ORDER BY period_index)"
    description: "Ordered list of status tokens: good, warn, down."
data_structure_template:
  data:
    value: "99.94"
    unit: "%"
    uptimeBars:
      - "good"
      - "good"
      - "warn"
      - "good"
      - "down"
      - "good"
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    unit: "unit"
    uptimeBars: "list(status ORDER BY period_index)"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "uptime-strip"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "99.94"
    unit: "%"
    uptimeBars:
      - "good"
      - "good"
      - "warn"
      - "good"
      - "down"
      - "good"
