title: "Signal Scale"
description: "Segmented signal gauge for directional quality or intensity."
component: "SignalScaleMicro"
runtime_type: "signal-scale"
aliases:
  - "signal-bars"
  - "score-scale"
category: "micro"
selection_hints:
  - "score 0-100"
  - "quality signal"
  - "health scale"
component_id_overrides:
  - "data-saturation"
  - "marketing-conv-rate"
  - "ad-fatigue"
data_requirements:
  - "value: Primary textual value displayed beside the scale."
  - "signalScore: Numeric score from 0 to 100."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Primary textual value displayed beside the scale."
  - alias: "unit"
    path: "data.unit"
    required: false
    sql_type: "string"
    expression_hint: "unit"
    description: "Unit or suffix."
  - alias: "signalScore"
    path: "data.signalScore"
    required: true
    sql_type: "number"
    expression_hint: "signalScore"
    description: "Numeric score from 0 to 100."
  - alias: "signalOrientation"
    path: "data.signalOrientation"
    required: false
    sql_type: "string"
    expression_hint: "signalOrientation"
    description: "vertical or horizontal."
  - alias: "signalLabel"
    path: "data.signalLabel"
    required: false
    sql_type: "string"
    expression_hint: "signalLabel"
    description: "Short quality label."
  - alias: "signalNote"
    path: "data.signalNote"
    required: false
    sql_type: "string"
    expression_hint: "signalNote"
    description: "Optional longer note shown on vertical layout."
  - alias: "goodAtHigh"
    path: "data.goodAtHigh"
    required: false
    sql_type: "boolean"
    expression_hint: "goodAtHigh"
    description: "True when higher scores are better."
data_structure_template:
  data:
    value: "84"
    unit: "%"
    signalScore: 84
    signalOrientation: "vertical"
    signalLabel: "Strong"
    signalNote: "Coverage is stable and healthy."
    goodAtHigh: true
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    unit: "unit"
    signalScore: "signalScore"
    signalOrientation: "signalOrientation"
    signalLabel: "signalLabel"
    signalNote: "signalNote"
    goodAtHigh: "goodAtHigh"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "signal-scale"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "84"
    unit: "%"
    signalScore: 84
    signalOrientation: "vertical"
    signalLabel: "Strong"
    signalNote: "Coverage is stable and healthy."
    goodAtHigh: true
