title: "Sparkline Stat"
description: "KPI with a small sparkline showing recent movement."
component: "SparklineStatMicro"
runtime_type: "sparkline-stat"
aliases:
  - "sparkline"
  - "mini-trend"
category: "micro"
selection_hints:
  - "single KPI + history"
  - "recent trend"
  - "small time series"
component_id_overrides:
  - "marketing-cpa"
  - "budget-burn"
data_requirements:
  - "value: Current value displayed above the sparkline."
  - "dataPoints: Ordered list of recent numeric values."
sql_aliases:
  - alias: "value"
    path: "data.value"
    required: true
    sql_type: "number|string"
    expression_hint: "value"
    description: "Current value displayed above the sparkline."
  - alias: "unit"
    path: "data.unit"
    required: false
    sql_type: "string"
    expression_hint: "unit"
    description: "Optional unit."
  - alias: "dataPoints"
    path: "data.dataPoints"
    required: true
    sql_type: "number[]"
    expression_hint: "list(metric_value ORDER BY period_index)"
    description: "Ordered list of recent numeric values."
  - alias: "sparklineColor"
    path: "data.sparklineColor"
    required: false
    sql_type: "string"
    expression_hint: "sparklineColor"
    description: "Optional hex color for the sparkline."
data_structure_template:
  data:
    value: "72"
    unit: "%"
    dataPoints:
      - 54
      - 57
      - 60
      - 63
      - 66
      - 69
      - 71
      - 72
    sparklineColor: "#ff7676"
grid_span: "default"
color_theme: "theme-productivity"
sdui:
  root_key: "data"
  mapping_mode: "single"
query_guidance:
  sql_shape: "single_row"
  data_root: "data"
  return_shape: "single"
  rules:
    - "Return SQL-derived fields under the `data` object."
    - "Use aliases exactly as listed in `sql_aliases`."
    - "Prefer one final row per widget payload; use DuckDB list/struct aggregations for nested arrays or objects."
  duckdb_patterns:
    - "Use `list(value ORDER BY sort_key)` for arrays."
    - "Use `struct_pack(key := value, ...)` for nested objects."
    - "Use `list(struct_pack(... ) ORDER BY sort_key)` for arrays of objects."
  alias_projection_examples:
    value: "value"
    unit: "unit"
    dataPoints: "list(metric_value ORDER BY period_index)"
    sparklineColor: "sparklineColor"
  recommended_grain: "single row"
  implementation_notes:
    - "Aggregate to the widget grain before packaging the payload."
    - "Return metadata like title, type, gridSpan and colorTheme outside the `data` object; place SQL-derived fields inside `data`."
    - "Format strings in SQL only when the component explicitly expects formatted labels; otherwise return numerics and let the UI format them."
insight_payload_contract:
  type: "sparkline-stat"
  gridSpan: "default"
  colorTheme: "theme-productivity"
  data:
    value: "72"
    unit: "%"
    dataPoints:
      - 54
      - 57
      - 60
      - 63
      - 66
      - 69
      - 71
      - 72
    sparklineColor: "#ff7676"
