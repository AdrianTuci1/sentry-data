title: Trend Spotter
description: "Identifies early-stage trends and topics by scanning social media or search data. Highlights growing interest before it reaches mass market."
data_requirements: ["keywords"]
sql_aliases:
  - text: "trend keyword"
  - weight: "importance score (0-100)"
  - trend: "direction (up, down, stable)"
data_structure_template:
  keywords:
    - { "text": "AI Automation", "weight": 95, "trend": "up" }
    - { "text": "Sustainable", "weight": 80, "trend": "up" }
    - { "text": "Omnichannel", "weight": 60, "trend": "stable" }
    - { "text": "Crypto", "weight": 35, "trend": "down" }
grid_span: "col-span-2 row-span-2"
color_theme: "theme-audience"
sdui:
  mapping_mode: single
  root_key: keywords
