version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - LOCAL_DEV_MODE=${LOCAL_DEV_MODE:-true}
      - FIRESTORE_EMULATOR_HOST=${FIRESTORE_EMULATOR_HOST:-host.docker.internal:8090}
      - API_PREFIX=${API_PREFIX:-/api/v1}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL:-http://chat:8080}
      - HARNESS_SERVICE_URL=${HARNESS_SERVICE_URL:-http://harness:8081}
      - OBSERVER_SERVICE_URL=${OBSERVER_SERVICE_URL:-http://observer:8082}
      - CLOUD_RUN_AUTH_MODE=${CLOUD_RUN_AUTH_MODE:-disabled}
      - ENABLE_MODAL_AGENTS=false
      - ENABLE_BIGQUERY_ANALYTICS=${ENABLE_BIGQUERY_ANALYTICS:-true}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - chat
      - harness
      - observer
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    restart: unless-stopped

  chat:
    build: ./services/chat
    env_file:
      - ./.env
    environment:
      - PORT=8080
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000/api/v1}
      - HARNESS_SERVICE_URL=${HARNESS_SERVICE_URL:-http://harness:8081}
      - OBSERVER_SERVICE_URL=${OBSERVER_SERVICE_URL:-http://observer:8082}
      - FIRESTORE_EMULATOR_HOST=${FIRESTORE_EMULATOR_HOST:-host.docker.internal:8090}
      - TEST_MODE=${TEST_MODE:-0}
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    restart: unless-stopped

  harness:
    build: ./services/harness
    env_file:
      - ./.env
    environment:
      - PORT=8081
      - GCS_BUCKET=${GCS_BUCKET_NAME:-sentry-platform-data}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
    volumes:
      - ${GCP_KEY_PATH:-~/.config/gcloud/application_default_credentials.json}:/secrets/gcp-key.json:ro
    restart: unless-stopped

  observer:
    build: ./services/observer
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      - PORT=8082
      - GCS_BUCKET=${GCS_BUCKET_NAME:-sentry-platform-data}
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000/api/v1}
      - HARNESS_SERVICE_URL=${HARNESS_SERVICE_URL:-http://harness:8081}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json
      - BQ_LOCATION=${BIGQUERY_LOCATION:-EU}
    volumes:
      - ${GCP_KEY_PATH:-~/.config/gcloud/application_default_credentials.json}:/secrets/gcp-key.json:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
