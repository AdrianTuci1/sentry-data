name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'services/**'
      - '.github/workflows/deploy-k8s.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: adriantuci1/sentry-data-backend
  WORKER_IMAGE: adriantuci1/sentry-data-worker
  CHAT_IMAGE: adriantuci1/sentry-data-chat
  HARNESS_IMAGE: adriantuci1/sentry-data-harness
  OBSERVER_IMAGE: adriantuci1/sentry-data-observer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push chat image
        uses: docker/build-push-action@v5
        with:
          context: ./services/chat
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.CHAT_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.CHAT_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push harness image
        uses: docker/build-push-action@v5
        with:
          context: ./services/harness
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.HARNESS_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.HARNESS_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push observer image
        uses: docker/build-push-action@v5
        with:
          context: ./services/observer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OBSERVER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OBSERVER_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes manifests
        run: |
          cd k8s/base
          kustomize edit set image ghcr.io/${{ env.BACKEND_IMAGE }}=ghcr.io/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.WORKER_IMAGE }}=ghcr.io/${{ env.WORKER_IMAGE }}:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.CHAT_IMAGE }}=ghcr.io/${{ env.CHAT_IMAGE }}:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.HARNESS_IMAGE }}=ghcr.io/${{ env.HARNESS_IMAGE }}:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.OBSERVER_IMAGE }}=ghcr.io/${{ env.OBSERVER_IMAGE }}:${{ github.sha }}
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kustomization.yaml
          git commit -m "chore: update sentry-data images to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
