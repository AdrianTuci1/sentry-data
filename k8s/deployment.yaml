apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-data-backend
  namespace: sentry-data
  labels:
    app.kubernetes.io/name: sentry-data
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentry-data
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentry-data
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: backend
          image: ghcr.io/adriantuci1/sentry-data-backend:d18bcb2a82b85087d289e1be1b032e23a533d46d
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sentry-data-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: JWT_SECRET
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: REFRESH_TOKEN_SECRET
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: INTERNAL_TOKEN
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: LLM_API_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp-key.json
          volumeMounts:
            - name: gcp-key
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: gcp-key
          secret:
            secretName: sentry-data-gcp-key
            items:
              - key: gcp-key.json
                path: gcp-key.json
