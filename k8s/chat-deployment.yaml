apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-data-chat
  namespace: sentry-data
  labels:
    app.kubernetes.io/name: sentry-data
    app.kubernetes.io/component: chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentry-data
      app.kubernetes.io/component: chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentry-data
        app.kubernetes.io/component: chat
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: chat
          image: ghcr.io/adriantuci1/sentry-data-chat:415f9b30459a1ac58943417f6c2fcf4437528c14
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sentry-data-config
          env:
            - name: PORT
              value: "8080"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: INTERNAL_TOKEN
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentry-data-secrets
                  key: LLM_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
